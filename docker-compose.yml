version: "3.8"
services:
  nest-app:
    build:
      context: ./
      dockerfile: ./Dockerfile

    depends_on:
      - mongodb-container
      - redis-container
    restart: always
    ports:
      # 对外端口（宿主机:容器），与 .env 中 SERVER_PORT 保持一致
      - 8000:8000
    # ports:
    #   - 3005:3005
    networks:
      - common-network
  mongodb-container:
    image: mongo
    volumes:
      - /Users/zhangyangguang/Downloads/同步空间/docker/mongo:/data/db
    ports:
      - 27017:27017
    networks:
      - common-network
  redis-container:
    image: redis
    volumes:
      - /Users/zhangyangguang/Downloads/同步空间/docker/redis:/data
    restart: always
    networks:
      - common-network
  minio-container:
    image: bitnami/minio:latest
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /Users/zhangyangguang/Downloads/同步空间/docker/minio:/bitnami/minio/data
    environment:
      MINIO_ROOT_USER: guang
      MINIO_ROOT_PASSWORD: dongdong
    restart: always
    networks:
      - common-network
networks:
  common-network:
    driver: bridge
